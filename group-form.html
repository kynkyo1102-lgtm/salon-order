<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>グループ注文フォーム</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; padding: 20px; background-color: #f4f4f4; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>グループ注文送信テスト</h2>
    <form id="orderForm">
        <div class="form-group">
            <label for="positionName">お名前（役職など）</label>
            <input type="text" id="positionName" value="テスト 太郎" required>
        </div>
        <div class="form-group">
            <label for="contact">連絡先</label>
            <input type="text" id="contact" value="090-1234-5678" required>
        </div>
        <div class="form-group">
            <label for="itemName">商品名</label>
            <input type="text" id="itemName" value="テスト商品A" required>
        </div>
        <div class="form-group">
            <label for="quantity">数量</label>
            <input type="number" id="quantity" value="1" min="1" required>
        </div>
        <div class="form-group">
            <label for="price">単価 (円)</label>
            <input type="number" id="price" value="1000" min="0" required>
        </div>
        <button type="submit">注文をテスト送信する</button>
    </form>
</div>

<script>
document.getElementById('orderForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    // 最新のGASのURLを埋め込んであります
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx4WePzlfSn7YjEJD1MBhcPTa9FD3W5Fu2Pol75IaSSaeMQOqJNONQdAR913sRsyUJd/exec";

    const positionName = document.getElementById('positionName').value;
    const contact = document.getElementById('contact').value;
    const itemName = document.getElementById('itemName').value;
    const quantity = parseInt(document.getElementById('quantity').value);
    const price = parseInt(document.getElementById('price').value);
    const subtotal = price * quantity;

    const today = new Date();
    const dateStr = today.getFullYear() + '/' + String(today.getMonth() + 1).padStart(2, '0') + '/' + String(today.getDate()).padStart(2, '0');

    // 送信データを作成
    const orderData = {
        date: dateStr,
        monthPeriod: String(today.getMonth() + 1) + "月度",
        contact: contact,
        memberId: "MEM-9999",
        positionName: positionName,
        orders: [
            {
                name: itemName,
                quantity: quantity,
                price: price,
                subtotal: subtotal
            }
        ]
    };

    // GASへデータを送信
    fetch(WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors', // CORSエラーを回避
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(orderData)
    })
    .then(() => {
        alert('テスト注文データを送信しました！LINEの通知を確認してください。');
    })
    .catch(error => {
        console.error('エラーが発生しました:', error);
        alert('送信に失敗しました。');
    });
});
</script>

</body>
</html>
