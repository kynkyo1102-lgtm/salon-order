<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サロン専用注文書作成ツール</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, サンセリフ体; background-color: #f5f7fa; padding: 20px; color: #333; line-height: 1.6; }
        .card { background: 白; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h3 { margin-top: 0; color: #007aff; border-bottom: 2px solid #f0f0f2; padding-bottom: 8px; font-size: 16px; }
        .form-group { margin-bottom: 12px; }
        .form-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .form-row .form-group { margin-bottom: 0; flex: 1; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px; color: #555; }
        input[type="text"], textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { background-color: #007aff; color: 白; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #0056b3; }
        .btn-secondary { background-color: #e5e5ea; color: #333; }
        .btn-secondary:hover { background-color: #d1d1d6; }
        .btn-danger { background-color: #ff3b30; color: 白; }
        .btn-danger:hover { background-color: #c93b2b; }
        .item-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #eee; }
        .output-box { width: 100%; height: 180px; font-family: monospace; font-size: 14px; background: #f9f9f9; resize: none; }
        .flex-container { display: flex; flex-direction: column; gap: 10px; }
        @media (min-width: 768px) {
            .flex-container { flex-direction: row; }
            .left-panel { flex: 1; }
            .right-panel { flex: 1; }
        }
        .toast { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.8); color: 白; padding: 10px 20px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="flex-container">
    <!-- 左側：入力フォーム -->
    <div class="left-panel">
        <div class="card">
            <h3>注文者情報</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="salonName">サロン名</label>
                    <input type="text" id="salonName" placeholder="例：マノア">
                </div>
                <div class="form-group">
                    <label for="ordererName">注文者氏名</label>
                    <input type="text" id="ordererName" placeholder="例：山田花子">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="shippingType">発送方法</label>
                    <select id="shippingType">
                        <option value="直送（顧客へ直接）">直送（顧客へ直接）</option>
                        <option value="サロン留め（まとめて発送）">サロン留め（まとめて発送）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="paymentType">支払方法</label>
                    <select id="paymentType">
                        <option value="代引き">代引き</option>
                        <option value="クレジットカード">クレジットカード</option>
                        <option value="振込">振込</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>商品注文内容</h3>
            <div id="itemsContainer">
                <!-- ここに商品行が追加されます -->
            </div>
            <button type="button" class="btn-secondary" onclick="addItemRow()" style="margin-top: 10px;">+ 商品を追加</button>
        </div>
    </div>

    <!-- 右側：出力結果 -->
    <div class="right-panel">
        <div class="card" style="height: calc(100% - 30px); display: flex; flex-direction: column;">
            <h3>生成された注文テキスト</h3>
            <textarea id="outputText" class="output-box" style="flex: 1; margin-bottom: 15px;" readonly placeholder="左側に入力するとここに自動生成されます..."></textarea>
            <button type="button" onclick="copyToClipboard()">テキストをコピー</button>
        </div>
    </div>
</div>

<div id="toast" class="toast">コピーしました！</div>

<script>
// 1. スプレッドシートからエクスポートしたCSVのURL（ウェブに公開したURL）
const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT17XvD73VwGz_P4S0w4B01T2ZIn3u2M5bU_xH6Q_g5F5GzY_L3vY4n9X4zD5Xz6x8B5b7c7d7e7f7/pub?output=csv"; 
// ※上記URLはダミーです。実際の手順で取得した「ウェブに公開」のCSV用URLに差し替えてください。

// 商品データを格納する配列
let products = [];

// スプレッドシートからデータを取得する関数
async function fetchProducts() {
    try {
        const response = await fetch(SPREADSHEET_CSV_URL);
        const csvText = await response.text();
        
        // CSVを行ごとに分割してパース
        const rows = csvText.split('\n').map(row => row.split(','));
        
        // 1行目のヘッダーを除外してループ処理
        products = rows.slice(1).filter(row => row.length >= 4 && row[0].trim() !== "").map(row => {
            return {
                name: row[0].trim(),
                price: parseInt(row[1]) || 0,
                // スプレッドシート4列目（7月度ポイント）を取得
                points: parseInt(row[3]) || 0 
            };
        });

        // 最初の1行目を初期配置
        addItemRow();
    } catch (error) {
        console.error("スプレッドシートの読み込みに失敗しました。フォールバックデータを使用します:", error);
        // 通信エラー時のバックアップ用データ
        products = [
            { name: "OX-288", price: 13800, points: 10000 },
            { name: "ハイプロリーナ", price: 7200, points: 6000 }
        ];
        addItemRow();
    }
}

// 商品行を追加する関数
function addItemRow() {
    const container = document.getElementById('itemsContainer');
    const rowIndex = container.children.length;
    
    const row = document.createElement('div');
    row.className = 'item-row';
    row.id = `itemRow_${rowIndex}`;
    
    // 商品選択プルダウンの作成
    let optionsHtml = '<option value="">商品を選択してください</option>';
    products.forEach((prod, idx) => {
        // プルダウンの表示に（価格 / ポイント）を反映
        optionsHtml += `<option value="${idx}">${prod.name} (${prod.price.toLocaleString()}円 / ${prod.points.toLocaleString()}pt)</option>`;
    });
    
    row.innerHTML = `
        <div class="form-group" style="flex: 2;">
            <label>商品名</label>
            <select class="product-select" onchange="updateCalculations()">${optionsHtml}</select>
        </div>
        <div class="form-group" style="flex: 1;">
            <label>数量</label>
            <input type="text" class="product-qty" value="1" style="text-align: center;" oninput="updateCalculations()">
        </div>
        <button type="button" class="btn-danger" onclick="removeItemRow(${rowIndex})" style="padding: 10px;">削除</button>
    `;
    
    container.appendChild(row);
    updateCalculations();
}

// 商品行を削除する関数
function removeItemRow(index) {
    const container = document.getElementById('itemsContainer');
    if (container.children.length > 1) {
        const row = document.getElementById(`itemRow_${index}`);
        row.remove();
        updateCalculations();
    } else {
        alert("これ以上削除できません。");
    }
}

// 入力内容からテキストおよび合計金額・ポイントを自動計算して反映する関数
function updateCalculations() {
    const salonName = document.getElementById('salonName').value;
    const ordererName = document.getElementById('ordererName').value;
    const shippingType = document.getElementById('shippingType').value;
    const paymentType = document.getElementById('paymentType').value;
    
    let itemsText = "";
    let totalPrice = 0;
    let totalPoints = 0;
    
    const rows = document.querySelectorAll('.item-row');
    rows.forEach(row => {
        const select = row.querySelector('.product-select');
        const qtyInput = row.querySelector('.product-qty');
        
        const productIndex = select.value;
        const qty = parseInt(qtyInput.value) || 0;
        
        if (productIndex !== "" && qty > 0) {
            const prod = products[productIndex];
            const itemPrice = prod.price * qty;
            const itemPoints = prod.points * qty;
            
            totalPrice += itemPrice;
            totalPoints += itemPoints;
            
            itemsText += `・${prod.name} × ${qty}（単価: ${prod.price.toLocaleString()}円 / ${prod.points.toLocaleString()}pt）\n`;
        }
    });
    
    // 出力用テキストの組み立て
    let output = `【サロン注文書】\n`;
    output += `---------------------------\n`;
    output += `■ サロン名：${salonName || "未入力"}\n`;
    output += `■ 注文者氏名：${ordererName || "未入力"}\n`;
    output += `■ 発送方法：${shippingType}\n`;
    output += `■ 支払方法：${paymentType}\n`;
    output += `---------------------------\n`;
    output += `■ 注文商品：\n${itemsText || "（商品が選択されていません）\n"}`;
    output += `---------------------------\n`;
    output += `■ 合計金額：${totalPrice.toLocaleString()} 円（税込）\n`;
    output += `■ 合計ポイント：${totalPoints.toLocaleString()} pt\n`;
    
    document.getElementById('outputText').value = output;
}

// クリップボードにコピーする関数
function copyToClipboard() {
    const outputText = document.getElementById('outputText');
    outputText.select();
    document.execCommand('copy');
    
    const toast = document.getElementById('toast');
    toast.className = "toast show";
    setTimeout(() => { toast.className = "toast"; }, 2000);
}

// 画面を開いた際に入力フォームの変更を検知できるようにイベントを設定
document.getElementById('salonName').addEventListener('input', updateCalculations);
document.getElementById('ordererName').addEventListener('input', updateCalculations);
document.getElementById('shippingType').addEventListener('change', updateCalculations);
document.getElementById('paymentType').addEventListener('change', updateCalculations);

// ページ読み込み開始時にスプレッドシートのデータをフェッチ
window.addEventListener('DOMContentLoaded', () => {
    fetchProducts();
});
</script>

</body>
</html>
